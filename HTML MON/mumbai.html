  <h1>Mumbai</h1>

  <p>Mumbai is known as the financial capital of India.</p>
  <p>It is home to <b>Bollywood</b>, the <i>Gateway of India</i>, and <u>Marine Drive</u>.</p>
  <p>The city never sleeps and offers a vibrant mix of tradition and modernity.</p>
